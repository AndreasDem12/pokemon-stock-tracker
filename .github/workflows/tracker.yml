name: Check Pokemon Stock
on:
  schedule:
    # Runs every 15 minutes between 06:00 UTC and 18:00 UTC
    - cron: '*/15 6-18 * * *'
  workflow_dispatch: # Allows manual testing anytime

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Restore Previous Scraping State
        id: cache-state
        uses: actions/cache@v4
        with:
          path: last_state.txt
          key: pokemon-stock-state-${{ github.run_id }}
          restore-keys: |
            pokemon-stock-state-

      - name: Fetch and Analyze Website Data
        id: scrape
        run: |
          # Use a real browser session configuration with headers to bypass security blocks
          curl -sL \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Cache-Control: no-cache" \
            -H "Pragma: no-cache" \
            "mavroslarnaca.com" | grep -o 'product-type-simple' | wc -l > current_state.txt
          
          CURRENT_COUNT=$(cat current_state.txt)
          echo "Live product count found: $CURRENT_COUNT"
          
          # Force a baseline state check
          if [ ! -f last_state.txt ]; then
            echo "0" > last_state.txt
          fi
          
          LAST_COUNT=$(cat last_state.txt)
          echo "Previous tracked product count: $LAST_COUNT"
          
          # Prevent false 0-to-0 matches if a request is temporarily dropped
          if [ "$CURRENT_COUNT" -eq 0 ]; then
            echo "Warning: Received an empty page. Skipping state updates to avoid data corruption."
            echo "CHANGED=false" >> $GITHUB_ENV
          elif [ "$CURRENT_COUNT" -eq "$LAST_COUNT" ]; then
            echo "CHANGED=false" >> $GITHUB_ENV
          else
            echo "CHANGED=true" >> $GITHUB_ENV
            cp current_state.txt last_state.txt
          fi

      - name: Save Updated State to Cache
        if: env.CHANGED == 'true'
        uses: actions/cache/save@v4
        with:
          path: last_state.txt
          key: pokemon-stock-state-${{ github.run_id }}

      - name: Send Discord Alert
        if: env.CHANGED == 'true'
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "<@423525742161297408> 🚨 **MAVROS LARNACA RESTOCK DETECTED!** The catalog layout has changed. Check immediately: https://mavroslarnaca.com/product-tag/pokemon/"}' \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"
