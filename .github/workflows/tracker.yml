name: Check Pokemon Stock
on:
  schedule:
    # Runs every 15 minutes between 06:00 UTC and 18:00 UTC
    - cron: '*/15 6-18 * * *'
  workflow_dispatch: # Allows manual testing anytime

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Restore Previous Scraping State
        id: cache-state
        uses: actions/cache@v4
        with:
          path: last_state.txt
          key: pokemon-stock-state-${{ github.run_id }}
          restore-keys: |
            pokemon-stock-state-

      - name: Fetch and Analyze Website Data
        id: scrape
        run: |
          # Completely web-encoded link to the direct WooCommerce Pokemon catalog collection page
          TARGET_URL="https%3A%2F%2Fmavroslarnaca.com%2Fproduct-tag%2Fpokemon%2F"
          
          # Properly structured API request targeting ScrapingAnt v2 general endpoint
          API_URL="scrapingant.com${TARGET_URL}&x-api-key=${{ secrets.SCRAPER_API_KEY }}"
          
          # Fetch the clean proxy-rendered page layout content
          curl -sL "$API_URL" | grep -o 'product-type-simple' | wc -l > current_state.txt
          
          CURRENT_COUNT=$(cat current_state.txt)
          echo "Live Pokemon product count found: $CURRENT_COUNT"
          
          if [ ! -f last_state.txt ]; then
            echo "0" > last_state.txt
          fi
          
          LAST_COUNT=$(cat last_state.txt)
          echo "Previous tracked count: $LAST_COUNT"
          
          if [ "$CURRENT_COUNT" -eq 0 ]; then
            echo "Warning: Proxy setup returned 0. Verify your ScrapingAnt API token entry."
            echo "CHANGED=false" >> $GITHUB_ENV
          elif [ "$CURRENT_COUNT" -eq "$LAST_COUNT" ]; then
            echo "CHANGED=false" >> $GITHUB_ENV
          else
            echo "CHANGED=true" >> $GITHUB_ENV
            cp current_state.txt last_state.txt
          fi

      - name: Save Updated State to Cache
        if: env.CHANGED == 'true'
        uses: actions/cache/save@v4
        with:
          path: last_state.txt
          key: pokemon-stock-state-${{ github.run_id }}

      - name: Send Discord Alert
        if: env.CHANGED == 'true'
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "<@423525742161297408> 🚨 **MAVROS LARNACA RESTOCK DETECTED!** The catalog layout has changed. Check immediately: https://mavroslarnaca.com/product-tag/pokemon/"}' \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"
